<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Junior Apartments | junior.apartments</title>
    <meta
      name="description"
      content="Junior Apartments is a static website hosted at junior.apartments."
    />
    <style>
      :root {
        color-scheme: light;
        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(140deg, #f8fafc, #e2e8f0);
        color: #0f172a;
      }

      main {
        width: min(680px, 92vw);
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
        padding: 2.5rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.9rem, 4vw, 2.4rem);
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .domain {
        margin-top: 1rem;
        display: inline-block;
        font-weight: 600;
      }

  </head>
  <body>
    <main>
      <h1>Welcome to Junior Apartments</h1>
      <p>
        This is the official static website for Junior Apartments.
      </p>
      <p class="domain">Domain: junior.apartments</p>
